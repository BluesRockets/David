version: '3.8'

services:
  backend:
    build: 
      context: ./agent
      dockerfile: Dockerfile
    container_name: david-backend
    # 如果后端不需要直接对外暴露（只由前端 Nginx 转发），可以注释掉这里的 ports
    # ports:
    #   - "8000:8000"
    env_file:
      - ./agent/.env
    restart: always

  frontend:
    build: 
      context: ./react
      dockerfile: Dockerfile
    container_name: david-frontend
    ports:
      - "2053:443"  # Cloudflare HTTPS
    # 将你的挂载配置加到这里：
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/stream.d:/etc/nginx/stream.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: always